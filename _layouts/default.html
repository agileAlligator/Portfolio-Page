<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script>document.documentElement.classList.add("js");</script>
		<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		{% seo %}
		{% feed_meta %}
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/assets/blog.css" />
		<link rel="stylesheet" href="/assets/syntax.css" />
		{% if page.extra_css %}<link rel="stylesheet" href="{{ page.extra_css }}" />{% endif %}
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- Fonts load async so they never block first paint; fallbacks render instantly, then swap -->
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
			/>
		</noscript>
	</head>
	<body>
		<a class="skip-link" href="#main">Skip to content</a>
		<div class="grain" aria-hidden="true"></div>

		<header class="nav" id="top">
			<a class="nav-brand" href="/"><span class="prompt">&gt;</span> avneesh<span class="blink">_</span></a>
			<nav class="nav-links" id="primary-nav" aria-label="Primary">
				<a href="/#about">about</a>
				<a href="/#experience">experience</a>
				<a href="/#work">work</a>
				<a href="/#skills">skills</a>
				<a href="/#contact">contact</a>
				<a href="/mcp/">mcp</a>
				<a href="/blog/" class="nav-out" aria-current="page">blog <span aria-hidden="true">↗</span></a>
				<a class="nav-resume" href="/resume.pdf" target="_blank" rel="noopener">résumé <span aria-hidden="true">↗</span></a>
			</nav>
			<button class="nav-toggle" type="button" aria-label="Toggle menu" aria-controls="primary-nav" aria-expanded="false">
				<span></span><span></span><span></span>
			</button>
		</header>

		<main class="content" id="main">
			{{ content }}
		</main>

		<footer class="footer site-footer">
			<span><span class="prompt">&gt;</span> built by Avneesh Kasture</span>
			<span class="site-footer-links">
				<a href="/feed.xml">RSS</a>
				<a href="https://github.com/agileAlligator" target="_blank" rel="noopener">github</a>
				<a href="https://www.linkedin.com/in/avneesh-kasture-491b651b6/" target="_blank" rel="noopener">linkedin</a>
			</span>
		</footer>

		<script src="/assets/nav.js" defer></script>
	</body>
</html>
