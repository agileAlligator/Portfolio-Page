<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script>document.documentElement.classList.add("js");</script>
		<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		{% seo %}
		{% feed_meta %}
		<link rel="stylesheet" href="/style.css" />
		{% if page.url contains '/blog' or page.layout == 'post' %}<link rel="stylesheet" href="/assets/blog.css" />
		<link rel="stylesheet" href="/assets/syntax.css" />{% endif %}
		{% if page.extra_css %}<link rel="stylesheet" href="{{ page.extra_css }}" />{% endif %}
		<!-- Self-hosted IBM Plex (latin woff2). The site serves its own type; no third-party font request. -->
		<link rel="preload" as="font" type="font/woff2" href="/assets/fonts/IBMPlexSans-400.woff2" crossorigin />
		<link rel="preload" as="font" type="font/woff2" href="/assets/fonts/IBMPlexMono-400.woff2" crossorigin />
		<link rel="preload" as="font" type="font/woff2" href="/assets/fonts/MartianMono-700.woff2" crossorigin />
		<link rel="stylesheet" href="/assets/fonts.css" />
	</head>
	<body>
		<a class="skip-link" href="#main">Skip to content</a>
		<div class="grain" aria-hidden="true"></div>

		<header class="nav" id="top">
			<a class="nav-brand" href="/"><span class="prompt">&gt;</span> avneesh<span class="blink">_</span></a>
			<nav class="nav-links" id="primary-nav" aria-label="Primary">
				<a href="/#about">about</a>
				<a href="/#experience">experience</a>
				<a href="/#work">work</a>
				<a href="/#skills">skills</a>
				<a href="/#contact">contact</a>
				<a href="/lab/">lab</a>
				<a href="/mcp/">mcp</a>
				<a href="/blog/" class="nav-out"{% if page.url contains '/blog' %} aria-current="page"{% endif %}>blog</a>
				<a class="nav-resume" href="/resume.pdf" target="_blank" rel="noopener">résumé <span aria-hidden="true">↗</span></a>
			</nav>
			<button class="nav-toggle" type="button" aria-label="Toggle menu" aria-controls="primary-nav" aria-expanded="false">
				<span></span><span></span><span></span>
			</button>
		</header>

		<main class="content" id="main">
			{{ content }}
		</main>

		<footer class="footer site-footer" aria-label="Site">
			<span><span class="prompt">&gt;</span> built by Avneesh Kasture</span>
			<span class="site-footer-links">
				<a href="/feed.xml">RSS</a>
				<a href="https://github.com/agileAlligator" target="_blank" rel="noopener">github</a>
				<a href="https://www.linkedin.com/in/avneesh-kasture-491b651b6/" target="_blank" rel="noopener">linkedin</a>
			</span>
		</footer>

		<script src="/assets/nav.js" defer></script>
	</body>
</html>
