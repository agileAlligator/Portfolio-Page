title: Avneesh Kasture
tagline: Secure MCP Engineer / Agentic Security
description: >-
  Building secure MCP servers for clients — hardening the agentic layer against
  prompt injection, tool misuse, and privilege abuse. Field notes on MCP
  security, agentic safety, and shipping AI platforms.
url: "https://avneeshk.me"
lang: en

author:
  name: Avneesh Kasture
  email: apkasture02@gmail.com

# Stable, dateless blog URLs (e.g. /blog/stdout-is-not-yours/).
# Individual posts may override this with a shorter slug in their front matter.
permalink: /blog/:title/

# Social / SEO (consumed by jekyll-seo-tag)
# Site-default share card. Pages set their own `image:` in front matter; those
# that don't fall back to this so every shared link renders a card.
image: /assets/og/default.png
twitter:
  card: summary_large_image
social:
  name: Avneesh Kasture
  links:
    - https://github.com/agileAlligator
    - https://www.linkedin.com/in/avneesh-kasture-491b651b6/

# GitHub Pages builds these natively — no Actions, no Gemfile needed.
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: /feed.xml

# ── Keep non-page assets OUT of sitemap.xml ─────────────────────────────────
# The sitemap should list indexable *content pages* only (home, /blog, posts).
# The entries below are downloadable/one-off files — PDFs and a standalone HTML
# toy — not pages we want Google to index or crawl as part of the site's page
# inventory. jekyll-sitemap honours `sitemap: false`; static files (no front
# matter of their own) get it via these path-scoped defaults.
# 👉 If you add another PDF or standalone asset, add a matching entry here or it
#    will silently reappear in the sitemap.
defaults:
  - scope: { path: "resume.pdf" }
    values: { sitemap: false }
  - scope: { path: "research-draft2024.pdf" }
    values: { sitemap: false }
  - scope: { path: "seinfeld-rolodex.html" }
    values: { sitemap: false }

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Don't process/publish these
exclude:
  - "*.skill"
  - dns-records-avneeshk.me.txt
  - README.md
  - DESIGN-SYSTEM.md
  - .claude
  - Gemfile
  - Gemfile.lock
  - vendor
  - mcp-worker
