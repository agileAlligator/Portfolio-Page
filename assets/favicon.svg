<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="an allowlist holding the asset — the boundary is defined by what it permits, not what it repels">
	<rect width="32" height="32" fill="#0a0b0d"/>
	<!-- the allowlist, written in code: two brackets.
	     cyan is THE MECHANISM — the deterministic layer, never a verdict. -->
	<path d="M4 6 h10 v4 h-6 v12 h6 v4 h-10 z"  fill="#4cc9f0"/>
	<path d="M28 6 h-10 v4 h6 v12 h-6 v4 h10 z" fill="#4cc9f0"/>
	<!-- the one permitted entry: the asset, amber, held. -->
	<circle cx="16" cy="16" r="5" fill="#f5b544"/>
</svg>
